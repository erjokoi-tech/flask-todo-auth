{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 style="margin-bottom:20px;color:#185FA5">Đăng nhập</h2>
    <form method="POST">
        <label>Email</label>
        <input type="email" name="email" placeholder="email@gmail.com" required>
        <label>Mật khẩu</label>
        <input type="password" name="mat_khau" placeholder="Mật khẩu" required>
        <button class="btn btn-blue" type="submit">Đăng nhập</button>
    </form>
    <p style="margin-top:16px;font-size:13px;text-align:center">
        Chưa có tài khoản? <a class="link" href="/dang-ky">Đăng ký ngay</a>
    </p>
</div>
{% endblock %}
