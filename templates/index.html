{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 style="margin-bottom:16px;color:#185FA5">Công việc của {{ ten }}</h2>
    <form method="POST" action="/them" style="display:flex;gap:8px;margin-bottom:8px">
        <input type="text" name="ten" placeholder="Thêm công việc..." required style="margin:0">
        <button class="btn btn-blue" type="submit" style="width:auto;white-space:nowrap">Thêm</button>
    </form>
</div>

<div class="card">
    {% if viec_list %}
        {% for viec in viec_list %}
        <div class="viec">
            <span class="ten">{{ viec["ten"] }}</span>
            <a href="/xoa/{{ viec['id'] }}">
                <button class="btn btn-red">Xóa</button>
            </a>
        </div>
        {% endfor %}
    {% else %}
        <p style="color:#aaa;text-align:center;font-size:14px">Danh sách trống!</p>
    {% endif %}
</div>
{% endblock %}
